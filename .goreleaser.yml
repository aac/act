# GoReleaser config for act
# Docs: https://goreleaser.com
# Validate locally with: goreleaser check
#
# This config drives the GitHub Actions release workflow (.github/workflows/release.yml)
# on every git tag of the form vX.Y.Z. It cross-compiles darwin/linux x arm64/amd64,
# uploads tarballs + checksums to the GitHub Release, and (optionally) publishes a
# Homebrew tap formula.
#
# Scope:
#   - darwin/linux x arm64/amd64 binaries on every tag
#   - no macOS code-signing / notarization (deferred)
#   - Homebrew tap publication wired but commented out until the tap repo exists
#
# Binary name: act.  Main package: ./cmd/act.  Version is injected at link time via
# -ldflags -X github.com/aac/act/internal/cli.BinaryVersion=<tag>, matching the
# scheme used by the existing manual release workflow and the Makefile.

version: 2

project_name: act

before:
  hooks:
    - go mod tidy

builds:
  - id: act
    main: ./cmd/act
    binary: act
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/aac/act/internal/cli.BinaryVersion={{ .Version }}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: act
    # Asset name pattern is load-bearing for scripts/install.sh's URL construction
    # if a release-download path is added in the future.
    # Keep in sync with any platform-detection block in that script.
    name_template: >-
      act_{{ .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    formats:
      - tar.gz
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  # Draft = true keeps the human in the loop on first release; flip to false once
  # the pipeline is dogfooded end-to-end.
  draft: true
  prerelease: auto
  name_template: "{{ .Tag }}"

# Homebrew tap publication.
#
# Commented out until the tap repo (`aac/homebrew-tap`) is created and a
# HOMEBREW_TAP_GITHUB_TOKEN secret is provisioned in this repo with `contents:write`
# on the tap. The tap repo name must be `homebrew-tap` for `brew tap aac/tap` to
# resolve to `github.com/aac/homebrew-tap`.
#
# To enable:
#   1. Create github.com/aac/homebrew-tap (empty repo, public).
#   2. Mint a PAT with `repo` scope, store as HOMEBREW_TAP_GITHUB_TOKEN secret.
#   3. Uncomment the block below and re-run `goreleaser check`.
#
# brews:
#   - name: act
#     repository:
#       owner: aac
#       name: homebrew-tap
#       token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
#     homepage: https://github.com/aac/act
#     description: "Agent task tracker (CLI + MCP)"
#     license: Apache-2.0
#     install: |
#       bin.install "act"
#     test: |
#       system "#{bin}/act", "version"
